{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card shadow border-success">
            <div class="card-body">
                <h3 class="card-title text-center mb-4 text-success">Załóż konto</h3>
                <form method="post">
                    <div class="mb-3">
                        <label class="form-label">Wybierz login</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Hasło</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Zarejestruj</button>
                </form>
                <hr>
                <p class="text-center mb-0"><a href="/login">Wróć do logowania</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
